<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aisptn</title>
    <link rel="stylesheet" href="https://aisptn.github.io/reset.css/reset.css">

    <style>
        body {
            align-items: center;
            display: flex;
            height: 100vh;
            justify-content: center;
        }
        body h1 {
            text-align: center;
        }
        section {
            align-items: center;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        article ul {
            margin: 0;
            padding: 0;
        }
        article ul li {
            list-style: none;
            width: 100%;
        }
        article ul li a,
        article ul li a button {
            display: block;
            width: 100%;
        }
        article ul li a {
            color: white;
            text-decoration: none;
        }
        article h2 {
            margin: 1rem 0 0.5rem;
            text-align: center;
        }
    </style>
</head>
<body>
    <main>
        <section>
            <h1>projects by aisptn</h1> 
            <article>
                <ul>
                    <li><a href="/polaroid" type="button">🖼️ polaroid maker</a></li>
                    <li><a href="/yt-audio-normaliser" type="button">🔊 yt audio normaliser</a></li>
                    <li><a href="/alarm" type="button">⏰ alarm clock <br>(broken for now)</a></li>
                    <li><a href="/image-converter" type="button">🖼️ image converter</a></li>
                </ul>
                <h2>new!!</h2>
                <ul>
                    <li><a href="/pasfoto" type="button">📸 pasfoto</a></li>
                </ul>
            </article>
        </section>
    </main>
</body>

</html>
