<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>aisptn</title>
    <link rel="stylesheet" href="https://aisptn.github.io/reset.css/reset.css">

    <style>
        body {
            align-items: center;
            display: flex;
            height: 100vh;
            justify-content: center;
        }
        section {
            align-items: center;
            display: flex;
            flex-direction: column;
            gap: 1rem;
        }
        article ul {
            display: inline-flex;
            flex-direction: column;
        }
        article ul li {
            list-style: none;
            width: 100%;
        }
        article ul li a,
        article ul li a button {
            display: block;
            width: 100%;
        }
        article ul li a {
            margin: 0 1rem;
            text-decoration: none;
        }
    </style>
</head>
<body>
    <main>
        <section>
            <h1>projects by aisptn</h1>
            <article>
                <ul>
                    <li><a href="/polaroid"><button>🖼️ polaroid maker</button></a></li>
                    <li><a href="/yt-audio-normaliser"><button>🔊 yt audio normaliser</button></a></li>
                    <li><a href="/alarm"><button>⏰ alarm clock</button></a></li>
                    <li><a href="/image-converter"><button>🖼️ image converter</button></a></li>
                </ul>
            </article>

        </section>
    </main>
</body>

</html>
